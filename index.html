<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sasuty Proxy v1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; background: #ffffff; color: #333; }
        
        /* タブバー */
        #tab-bar { display: flex; background: #f8f9fa; padding: 8px 8px 0 8px; gap: 4px; border-bottom: 1px solid #ddd; overflow-x: auto; }
        .tab { padding: 8px 16px; background: #e9ecef; border-radius: 8px 8px 0 0; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; min-width: 120px; justify-content: space-between; }
        .tab.active { background: #ffffff; border: 1px solid #ddd; border-bottom: none; font-weight: 600; }
        .tab button { border: none; background: none; cursor: pointer; color: #666; font-size: 16px; line-height: 1; }
        #add-tab { padding: 4px 12px; cursor: pointer; background: none; border: 1px solid #ddd; border-radius: 8px 8px 0 0; font-size: 18px; color: #333; }

        /* ブラウザ領域 */
        #browser-container { flex: 1; position: relative; display: flex; flex-direction: column; }
        .view { width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }
        
        /* ツールバー */
        .toolbar { padding: 12px; display: flex; gap: 8px; border-bottom: 1px solid #eee; background: #ffffff; }
        .url-bar { flex: 1; padding: 8px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; outline: none; }
        .url-bar:focus { border-color: #333; }
        .go-btn { padding: 8px 16px; background: #333; color: white; border: none; border-radius: 6px; cursor: pointer; }
        
        /* ホーム画面 */
        .home-screen { padding: 60px 20px; text-align: center; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .home-screen h2 { margin-bottom: 24px; font-weight: 700; }
        .bookmarks { margin-top: 20px; display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
        .bookmark-item { padding: 10px 20px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 20px; cursor: pointer; transition: background 0.2s; }
        .bookmark-item:hover { background: #eee; }
        
        iframe { flex: 1; border: none; width: 100%; }
    </style>
</head>
<body>

<div id="tab-bar">
    <div id="tabs-container" style="display:flex; gap:4px;"></div>
    <button id="add-tab" onclick="createTab()">+</button>
</div>

<div id="browser-container"></div>

<script src="uv/uv.bundle.js"></script>
<script src="uv/uv.config.js"></script>
<script type="module">
    import { registerSW } from "/prxy/register-sw.mjs";
    import * as BareMux from "/prxy/baremux/index.mjs";

    const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");

    window.createTab = function() {
        const id = Date.now();
        const tabEl = document.createElement('div');
        tabEl.className = 'tab active';
        tabEl.id = `tab-${id}`;
        tabEl.innerHTML = `<span>新規タブ</span><button onclick="event.stopPropagation(); removeTab(${id})">×</button>`;
        tabEl.onclick = () => switchTab(id);
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tabs-container').appendChild(tabEl);
        
        const view = document.createElement('div');
        view.className = 'view active';
        view.id = `view-${id}`;
        view.innerHTML = `
            <div class="toolbar">
                <input type="text" class="url-bar" placeholder="URLを入力または検索...">
                <button class="go-btn" onclick="loadProxy(${id})">移動</button>
            </div>
            <div class="home-screen">
                <h2>Sasuty Proxy v1</h2>
                <div class="bookmarks">
                    <div class="bookmark-item" onclick="quickLoad(${id}, 'https://google.com')">Google</div>
                    <div class="bookmark-item" onclick="quickLoad(${id}, 'https://youtube.com')">YouTube</div>
                    <div class="bookmark-item" onclick="quickLoad(${id}, 'https://github.com')">GitHub</div>
                </div>
            </div>
            <iframe style="display:none"></iframe>
        `;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('browser-container').appendChild(view);
    }

    window.switchTab = function(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
        document.getElementById(`view-${id}`).classList.add('active');
    }

    window.removeTab = function(id) {
        const tab = document.getElementById(`tab-${id}`);
        const view = document.getElementById(`view-${id}`);
        if (document.querySelectorAll('.tab').length > 1) {
            tab.remove();
            view.remove();
            if (document.getElementById(`tab-${id}`)?.classList.contains('active')) {
                const remainingTabs = document.querySelectorAll('.tab');
                switchTab(remainingTabs[remainingTabs.length - 1].id.replace('tab-', ''));
            }
        }
    }

    window.quickLoad = function(id, url) {
        document.getElementById(`view-${id}`).querySelector('.url-bar').value = url;
        loadProxy(id);
    }

    window.loadProxy = async function(id) {
        const view = document.getElementById(`view-${id}`);
        const input = view.querySelector('.url-bar').value;
        const iframe = view.querySelector('iframe');
        const home = view.querySelector('.home-screen');

        await registerSW();
        
        if (typeof __uv$config === 'undefined') { alert("Proxy設定が未ロードです"); return; }

        const url = input.startsWith('http') ? input : 'https://google.com/search?q=' + encodeURIComponent(input);
        iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        
        home.style.display = 'none';
        iframe.style.display = 'block';
        
        const tab = document.getElementById(`tab-${id}`);
        tab.querySelector('span').textContent = new URL(url).hostname;
    }

    // 初期化
    createTab();
</script>
</body>
</html>
