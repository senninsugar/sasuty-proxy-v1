<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>Sasuty Proxy v1</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; height: 100vh; display: flex; flex-direction: column; background: #020205; color: #ffffff; overflow: hidden; }
        
        /* タブバー */
        #tab-bar { display: flex; background: rgba(5, 5, 10, 0.95); padding: 8px 8px 0 8px; gap: 4px; border-bottom: 1px solid rgba(255,255,255,0.05); overflow-x: auto; }
        .tab { min-width: 140px; height: 36px; background: rgba(255,255,255,0.03); border-radius: 8px 8px 0 0; display: flex; align-items: center; padding: 0 12px; cursor: pointer; border: 1px solid transparent; border-bottom: none; font-size: 0.8rem; }
        .tab.active { background: rgba(30, 30, 45, 0.8); border: 1px solid rgba(139, 92, 246, 0.3); border-bottom: none; }
        .tab-close { margin-left: auto; opacity: 0.5; }
        .new-tab-btn { background: none; border: none; color: white; padding: 0 10px; cursor: pointer; }

        /* ブラウザ */
        #browser-container { flex: 1; position: relative; }
        .view { width: 100%; height: 100%; display: none; flex-direction: column; }
        .view.active { display: flex; }
        
        .toolbar { padding: 12px; display: flex; gap: 8px; background: rgba(10, 10, 15, 0.8); align-items: center; }
        .url-bar { flex: 1; height: 38px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 19px; padding: 0 20px; color: white; }
        
        iframe { flex: 1; border: none; background: white; }
    </style>
</head>
<body>

<header id="tab-bar">
    <button class="new-tab-btn" onclick="createTab()">+</button>
</header>

<div id="browser-container"></div>

<script src="uv/uv.bundle.js"></script>
<script src="uv/uv.config.js"></script>
<script type="module">
    import { registerSW } from "/prxy/register-sw.mjs";
    import * as BareMux from "/prxy/baremux/index.mjs";

    const connection = new BareMux.BareMuxConnection("/prxy/baremux/worker.js");
    const wispServers = [
        "wss://wisp.rhw.one/", "wss://wisp.webmc.fun/", "wss://anura.pro/",
        "wss://server.rubynetwork.co/wisp/", "wss://wisp.mercurywork.shop/",
        "wss://wisp.lrga.space/", "wss://wisp.gointerstellar.app/", "wss://tomp.app/wisp/"
    ];

    async function checkWisp(url) {
        return new Promise((res) => {
            const ws = new WebSocket(url);
            const timer = setTimeout(() => { ws.close(); res(false); }, 3000);
            ws.onopen = () => { clearTimeout(timer); ws.close(); res(true); };
            ws.onerror = () => { clearTimeout(timer); res(false); };
        });
    }

    async function getAvailableWisp() {
        for (const url of wispServers) {
            if (await checkWisp(url)) return url;
        }
        throw new Error("No nodes available.");
    }

    window.createTab = function() {
        const id = Date.now();
        const tabEl = document.createElement('div');
        tabEl.className = 'tab active';
        tabEl.id = `tab-${id}`;
        tabEl.innerHTML = `<span>新規タブ</span><span class="tab-close" onclick="event.stopPropagation(); removeTab(${id})">×</span>`;
        tabEl.onclick = () => switchTab(id);
        
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.getElementById('tab-bar').insertBefore(tabEl, document.querySelector('.new-tab-btn'));
        
        const view = document.createElement('div');
        view.className = 'view active';
        view.id = `view-${id}`;
        view.innerHTML = `
            <div class="toolbar">
                <input type="text" class="url-bar" placeholder="URLを入力...">
                <button onclick="loadProxy(${id})">移動</button>
            </div>
            <iframe style="display:none"></iframe>
        `;
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById('browser-container').appendChild(view);
    }

    window.loadProxy = async function(id) {
        const view = document.getElementById(`view-${id}`);
        const input = view.querySelector('.url-bar').value;
        const iframe = view.querySelector('iframe');

        await registerSW();
        const wispUrl = await getAvailableWisp();
        await connection.setTransport("/prxy/epoxy/index.mjs", [{ wisp: wispUrl }]);

        const url = input.startsWith('http') ? input : 'https://google.com/search?q=' + encodeURIComponent(input);
        iframe.src = __uv$config.prefix + __uv$config.encodeUrl(url);
        iframe.style.display = 'block';
        view.querySelector('span').textContent = new URL(url).hostname;
    }

    window.switchTab = (id) => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
        document.getElementById(`tab-${id}`).classList.add('active');
        document.getElementById(`view-${id}`).classList.add('active');
    }

    window.removeTab = (id) => {
        document.getElementById(`tab-${id}`).remove();
        document.getElementById(`view-${id}`).remove();
    }

    createTab();
</script>
</body>
</html>
